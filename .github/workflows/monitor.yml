name: Monitor Vuelos BOG → SMR

on:
  schedule:
    - cron: "0 13 * * *"   # cada día a las 8:00 AM hora Colombia (UTC-5)
  workflow_dispatch:        # permite ejecutarlo manualmente desde GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Ejecutar monitor de vuelos
        env:
          CALLMEBOT_PHONE:  ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          JSON_PATH: precios_minimos.json
        run: python monitor_vuelos.py

      - name: Guardar JSON actualizado en el repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add precios_minimos.json
          git diff --cached --quiet || git commit -m "chore: actualizar precio mínimo BOG→SMR $(date -u +'%Y-%m-%d')"
          git push
