name: Monitor Vuelos BOG → SMR

on:
  schedule:
    - cron: "*/30 * * * *"  # cada 30 minutos
  workflow_dispatch:        # permite ejecutarlo manualmente desde GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar Python + cache pip
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"                  # cachea paquetes pip automáticamente

      - name: Instalar dependencias pip
        run: pip install -r requirements.txt

      - name: Cache binarios Playwright
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # la clave cambia solo cuando cambia la versión de playwright en requirements.txt
          key: playwright-chromium-${{ hashFiles('requirements.txt') }}

      - name: Instalar Chromium (solo si no hay cache)
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Ejecutar monitor de vuelos
        env:
          CALLMEBOT_PHONE:  ${{ secrets.CALLMEBOT_PHONE || vars.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY || vars.CALLMEBOT_APIKEY }}
          JSON_PATH: precios_minimos.json
        run: python monitor_vuelos.py

      - name: Guardar JSON actualizado en el repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add precios_minimos.json
          git diff --cached --quiet || git commit -m "chore: actualizar precio mínimo BOG→SMR $(date -u +'%Y-%m-%d')"
          git push
