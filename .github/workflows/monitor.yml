name: ✈️ Flight Price Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Caché de paquetes pip ──────────────────────────────
      - name: 📦 Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      # ── Caché de Chromium (el más pesado, ~300 MB) ─────────
      - name: 🌐 Cache Playwright browsers
        id: cache-pw
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-1.44.0

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 🌐 Instalar Chromium (solo si no está en caché)
        if: steps.cache-pw.outputs.cache-hit != 'true'
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: 🔍 Revisar precios
        run: python flight_monitor.py

      - name: 💾 Guardar precios mínimos
        run: |
          git config user.name "Flight Monitor Bot"
          git config user.email "bot@github.com"
          git add lowest_prices.json || true
          git diff --staged --quiet || git commit -m "chore: update lowest prices [skip ci]"
          git push || true

      - name: 📸 Subir screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: "*.png"
          if-no-files-found: ignore
          retention-days: 2
